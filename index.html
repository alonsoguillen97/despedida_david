<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Despedida David</title>
  <style>
    body{font-family:system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,Cantarell,Noto Sans,Helvetica,Arial,sans-serif;max-width:900px;margin:40px auto;padding:0 16px;line-height:1.5}
    header{margin-bottom:24px}
    h1{margin:0 0 8px}
    .card{border:1px solid #e5e7eb;border-radius:12px;padding:16px;margin:12px 0}
    .muted{color:#6b7280}
    a.button{display:inline-block;background:#111827;color:#fff;text-decoration:none;padding:10px 14px;border-radius:10px}
    footer{margin-top:32px;font-size:14px;color:#6b7280}
  </style>
</head>
<body>
  <header>
    <h1>Despedida de David</h1>
    <p class="muted">Página publicada con GitHub Pages.</p>
  </header>

  <section class="card">
    <h2>¡Bienvenidos!</h2>
    <p>Esta es una página de ejemplo. Edita <code>index.html</code> para poner tu contenido: fecha, lugar, fotos y mensajes.</p>
    <p><a class="button" href="#info">Ver información</a></p>
  </section>

  <section id="info" class="card">
    <h2>Información</h2>
    <ul>
      <li><strong>Fecha:</strong> (por definir)</li>
      <li><strong>Lugar:</strong> (por definir)</li>
      <li><strong>Hora:</strong> (por definir)</li>
    </ul>
  </section>

  <footer>
    <p>© 2026</p>
  </footer>
</body>
</html>
